services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: development
    container_name: ${APP_CONTAINER_NAME}
    working_dir: /usr/src/app
    ports:
      - "${APP_PORT}:3007"
    volumes:
      - ./app:/usr/src/app
      - ./.env:/usr/src/app/.env
      - /usr/src/app/node_modules
    env_file:
      - ./.env
    environment:
      - NODE_ENV=${NODE_ENV}
      - APP_PORT=${APP_PORT}
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
    depends_on:
      - db
    networks:
      - canchaYa_network

  db:
    image: postgres:17-alpine
    ports:
      - "$POSTGRES_PORT:5432"
    container_name: ${DB_CONTAINER_NAME}
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - data_canchaYa:/var/lib/postgresql/data
    networks:
      - canchaYa_network

volumes:
  data_canchaYa:

networks:
  canchaYa_network:
    driver: bridge
